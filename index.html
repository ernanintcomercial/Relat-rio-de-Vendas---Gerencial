<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Vendas</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container { max-width: 960px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        .header-top {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        header span {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }
        .update-info {
            margin-top: 6px;
            font-size: 0.78rem;
            color: #6b7280;
        }
        .update-info strong { color: #1a1a2e; }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Garante que as colunas nunca fiquem "espremidas" a ponto de
           virar ilegível; abaixo de min-width o card rola na horizontal
           em vez de quebrar os números de forma estranha. */
        table { width: 100%; min-width: 620px; border-collapse: collapse; }

        /* HEADER */
        thead tr {
            background: #1a1a2e;
            color: #fff;
        }
        thead th {
            padding: 13px 16px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        thead th:not(:first-child) { text-align: right; }

        /* Valores numéricos nunca quebram linha, mesmo em telas estreitas */
        td:not(:first-child) { white-space: nowrap; }

        /* BRASIL row */
        .row-brasil td {
            padding: 14px 16px;
            background: #1a1a2e;
            color: #f9fafb;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid #374151;
        }
        .row-brasil td:not(:first-child) { text-align: right; }

        /* REGIÃO row */
        .row-regiao td {
            padding: 13px 16px;
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
            transition: background .15s;
            user-select: none;
        }
        .row-regiao:hover td { background: #eff6ff; }
        .row-regiao td:not(:first-child) { text-align: right; }
        .label-cell { display: flex; align-items: center; gap: 8px; }
        .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 4px;
            background: #e2e8f0;
            font-size: 0.6rem;
            color: #475569;
            transition: transform .2s, background .15s;
            flex-shrink: 0;
        }
        .row-regiao.open .arrow {
            transform: rotate(90deg);
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* ESTADO row (agora também clicável, expande representantes) */
        .row-estado td {
            padding: 10px 16px 10px 40px;
            background: #fff;
            font-size: 0.8rem;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
            transition: background .1s;
            cursor: pointer;
            user-select: none;
        }
        .row-estado:hover td { background: #f9fafb; }
        .row-estado td:not(:first-child) { text-align: right; }
        .row-estado { display: none; }
        .row-estado.visible { display: table-row; }
        .row-estado .arrow { width: 16px; height: 16px; font-size: 0.55rem; }
        .row-estado.open .arrow { transform: rotate(90deg); background: #dbeafe; color: #1d4ed8; }

        /* REPRESENTANTE row (clicável, expande contratos) */
        .row-representante td {
            padding: 9px 16px 9px 62px;
            background: #fbfcfd;
            font-size: 0.76rem;
            color: #4b5563;
            border-bottom: 1px solid #f3f4f6;
            transition: background .1s;
            cursor: pointer;
            user-select: none;
        }
        .row-representante:hover td { background: #f3f4f6; }
        .row-representante td:not(:first-child) { text-align: right; }
        .row-representante { display: none; }
        .row-representante.visible { display: table-row; }
        .row-representante .arrow { width: 14px; height: 14px; font-size: 0.5rem; }
        .row-representante.open .arrow { transform: rotate(90deg); background: #dbeafe; color: #1d4ed8; }

        /* CONTRATO row (nível mais fundo, não clicável) */
        .row-contrato td {
            padding: 7px 16px 7px 84px;
            background: #fff;
            font-size: 0.72rem;
            color: #6b7280;
            border-bottom: 1px solid #f8fafc;
        }
        .row-contrato td:not(:first-child) { text-align: right; }
        .row-contrato { display: none; }
        .row-contrato.visible { display: table-row; }

        /* BADGE % */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            min-width: 48px;
            text-align: center;
        }
        .badge-brasil  { background: #d1fae5; color: #065f46; }
        .badge-regiao  { background: #dbeafe; color: #1e40af; }
        .badge-estado  { background: #f3f4f6; color: #374151; }
        .badge-contrato{ background: #f9fafb; color: #6b7280; font-weight: 600; }
        .badge-low     { background: #fee2e2; color: #991b1b; }
        .badge-mid     { background: #fef3c7; color: #92400e; }

        .loading {
            text-align: center;
            padding: 48px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        .error { color: #dc2626; }

        @media (max-width: 600px) {
            body { padding: 16px 8px; }
            header { gap: 8px; margin-bottom: 16px; }
            header h1 { font-size: 1.25rem; }
            .card { border-radius: 10px; }
            .row-estado td { padding-left: 28px; }
            .row-representante td { padding-left: 42px; }
            .row-contrato td { padding-left: 56px; }
            thead th, .row-brasil td, .row-regiao td, .row-estado td, .row-representante td, .row-contrato td { padding-top: 10px; padding-bottom: 10px; padding-right: 10px; }
            .arrow { width: 22px; height: 22px; }
        }

        @media (max-width: 400px) {
            thead th, .row-brasil td, .row-regiao td, .row-estado td, .row-representante td, .row-contrato td { padding-top: 8px; padding-bottom: 8px; padding-right: 8px; font-size: 0.7rem; }
            .row-brasil td { font-size: 0.78rem; }
            .row-regiao td { font-size: 0.74rem; }
            .row-estado td { font-size: 0.7rem; padding-left: 22px; }
            .row-representante td { font-size: 0.68rem; padding-left: 34px; }
            .row-contrato td { font-size: 0.66rem; padding-left: 46px; }
            .badge { padding: 2px 6px; min-width: 40px; font-size: 0.68rem; }
            table { min-width: 560px; }
            .update-info { font-size: 0.72rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-top">
            <h1>📊 Acompanhamento de Vendas</h1>
            <span>clique em região, estado ou representante para expandir</span>
        </div>
        <div class="update-info" id="updateInfo"></div>
    </header>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="width:32%">Região / Estado</th>
                    <th>Meta Total</th>
                    <th id="thMetaParcial">Meta até --/--</th>
                    <th>Realizado</th>
                    <th>Atingimento</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="5" class="loading">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Este site NÃO processa mais planilha nenhuma no navegador — ele só lê
    // o resumo.json, que já vem pronto (gerado no repositório privado).
    // A partir da versão com detalhamento por representante/contrato, o
    // resumo.json PASSA a conter dado individual (nome do representante).
    // Por isso este site deve ficar atrás do Worker de autenticação
    // (usuário/senha) — não publique este resumo.json sem essa proteção.
    const ARQUIVO_RESUMO = 'resumo.json';

    function fmt(v) {
        return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
    }

    function pct(realizado, meta) {
        if (!meta || meta === 0) return 0;
        return Math.round((realizado / meta) * 100);
    }

    function badgeClass(p, tipo) {
        if (tipo === 'brasil') return 'badge badge-brasil';
        if (tipo === 'regiao') {
            if (p < 10) return 'badge badge-low';
            if (p < 30) return 'badge badge-mid';
            return 'badge badge-regiao';
        }
        if (p < 10) return 'badge badge-low';
        if (p < 30) return 'badge badge-mid';
        return 'badge badge-estado';
    }

    // Cada linha (região/estado/representante/contrato) tem uma "chave" tipo
    // "0", "0-2", "0-2-1", "0-2-1-3" — números separados por hífen indicando
    // o caminho na árvore. toggle() abre/fecha os filhos DIRETOS dessa chave;
    // ao fechar, fecha também tudo mais fundo (netos, bisnetos), pra não
    // ficar um estado "lembrando" que estava aberto quando a região reabrir.
    function ehFilhoDireto(chavePai, chaveTeste) {
        if (!chaveTeste.startsWith(chavePai + '-')) return false;
        return !chaveTeste.slice(chavePai.length + 1).includes('-');
    }

    function toggle(chave) {
        const linha = document.getElementById('row-' + chave);
        const abrindo = !linha.classList.contains('open');
        linha.classList.toggle('open', abrindo);

        document.querySelectorAll('[data-chave]').forEach(el => {
            const chaveEl = el.getAttribute('data-chave');
            if (ehFilhoDireto(chave, chaveEl)) {
                el.classList.toggle('visible', abrindo);
                if (!abrindo) el.classList.remove('open');
            } else if (!abrindo && chaveEl.startsWith(chave + '-')) {
                // fecha tudo mais fundo também, ao colapsar
                el.classList.remove('visible');
                el.classList.remove('open');
            }
        });
    }

    async function carregar() {
        try {
            const resp = await fetch(ARQUIVO_RESUMO + '?t=' + Date.now()); // evita cache velho
            if (!resp.ok) throw new Error(`Arquivo não encontrado: ${ARQUIVO_RESUMO}`);
            const resumo = await resp.json();

            document.getElementById('updateInfo').innerHTML =
                `Última atualização: <strong>${resumo.geradoEm}</strong> &nbsp;·&nbsp; ` +
                `Dias úteis decorridos: <strong>${resumo.diasUteisDecorridos}/${resumo.diasUteisMes}</strong>`;
            document.getElementById('thMetaParcial').textContent = `Meta até ${resumo.metaAteData}`;

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            // ---- BRASIL ----
            const brasil = resumo.brasil;
            const pBr = pct(brasil.real, brasil.metaAteOntem);
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="row-brasil">
                    <td>🇧🇷 BRASIL</td>
                    <td>${fmt(brasil.meta)}</td>
                    <td>${fmt(brasil.metaAteOntem)}</td>
                    <td>${fmt(brasil.real)}</td>
                    <td><span class="${badgeClass(pBr,'brasil')}">${pBr}%</span></td>
                </tr>
            `);

            // ---- REGIÕES + ESTADOS + REPRESENTANTES + CONTRATOS ----
            resumo.regioes.forEach((rd, ridx) => {
                const chaveRegiao = String(ridx);
                const pR = pct(rd.real, rd.metaAteOntem);

                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="row-regiao" id="row-${chaveRegiao}" data-chave="${chaveRegiao}" onclick="toggle('${chaveRegiao}')">
                        <td>
                            <div class="label-cell">
                                <span class="arrow">▶</span>
                                ${rd.nome}
                            </div>
                        </td>
                        <td>${fmt(rd.meta)}</td>
                        <td>${fmt(rd.metaAteOntem)}</td>
                        <td>${fmt(rd.real)}</td>
                        <td><span class="${badgeClass(pR,'regiao')}">${pR}%</span></td>
                    </tr>
                `);

                rd.estados.forEach((e, eidx) => {
                    const chaveEstado = chaveRegiao + '-' + eidx;
                    const pE = pct(e.real, e.metaAteOntem);
                    tbody.insertAdjacentHTML('beforeend', `
                        <tr class="row-estado" id="row-${chaveEstado}" data-chave="${chaveEstado}" onclick="event.stopPropagation(); toggle('${chaveEstado}')">
                            <td>
                                <div class="label-cell">
                                    <span class="arrow">▶</span>
                                    ${e.uf}
                                </div>
                            </td>
                            <td>${fmt(e.meta)}</td>
                            <td>${fmt(e.metaAteOntem)}</td>
                            <td>${fmt(e.real)}</td>
                            <td><span class="${badgeClass(pE,'estado')}">${pE}%</span></td>
                        </tr>
                    `);

                    (e.representantes || []).forEach((p, pidx) => {
                        const chaveRep = chaveEstado + '-' + pidx;
                        const pP = pct(p.real, p.metaAteOntem);
                        tbody.insertAdjacentHTML('beforeend', `
                            <tr class="row-representante" id="row-${chaveRep}" data-chave="${chaveRep}" onclick="event.stopPropagation(); toggle('${chaveRep}')">
                                <td>
                                    <div class="label-cell">
                                        <span class="arrow">▶</span>
                                        ${p.nome}
                                    </div>
                                </td>
                                <td>${fmt(p.meta)}</td>
                                <td>${fmt(p.metaAteOntem)}</td>
                                <td>${fmt(p.real)}</td>
                                <td><span class="${badgeClass(pP,'estado')}">${pP}%</span></td>
                            </tr>
                        `);

                        (p.contratos || []).forEach((c, cidx) => {
                            const chaveContrato = chaveRep + '-' + cidx;
                            const pC = pct(c.real, c.metaAteOntem);
                            tbody.insertAdjacentHTML('beforeend', `
                                <tr class="row-contrato" data-chave="${chaveContrato}">
                                    <td>${c.contrato}</td>
                                    <td>${fmt(c.meta)}</td>
                                    <td>${fmt(c.metaAteOntem)}</td>
                                    <td>${fmt(c.real)}</td>
                                    <td><span class="badge badge-contrato">${pC}%</span></td>
                                </tr>
                            `);
                        });
                    });
                });
            });

        } catch (err) {
            console.error(err);
            document.getElementById('tbody').innerHTML =
                `<tr><td colspan="5" class="loading error">❌ ${err.message}</td></tr>`;
        }
    }

    carregar();
</script>
</body>
</html>
