<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Vendas</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container { max-width: 960px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        .header-top {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        header span {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }
        .update-info {
            margin-top: 6px;
            font-size: 0.78rem;
            color: #6b7280;
        }
        .update-info strong { color: #1a1a2e; }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .toolbar input[type="text"] {
            flex: 1 1 240px;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.85rem;
            background: #fff;
            color: #1a1a2e;
        }
        .toolbar input[type="text"]:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29,78,216,.12);
        }
        .toolbar button {
            flex: 0 0 auto;
            padding: 10px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #1a1a2e;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background .15s;
        }
        .toolbar button:hover { background: #eff6ff; border-color: #93c5fd; }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Garante que as colunas nunca fiquem "espremidas" a ponto de
           virar ilegível; abaixo de min-width o card rola na horizontal
           em vez de quebrar os números de forma estranha. */
        table { width: 100%; min-width: 620px; border-collapse: collapse; }

        /* HEADER */
        thead tr {
            background: #1a1a2e;
            color: #fff;
        }
        thead th {
            padding: 13px 16px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        thead th:not(:first-child) { text-align: right; }

        /* Valores numéricos nunca quebram linha, mesmo em telas estreitas */
        td:not(:first-child) { white-space: nowrap; }

        /* BRASIL row */
        .row-brasil td {
            padding: 14px 16px;
            background: #1a1a2e;
            color: #f9fafb;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid #374151;
        }
        .row-brasil td:not(:first-child) { text-align: right; }

        /* REGIÃO row */
        .row-regiao td {
            padding: 13px 16px;
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
            transition: background .15s;
            user-select: none;
        }
        .row-regiao:hover td { background: #eff6ff; }
        .row-regiao td:not(:first-child) { text-align: right; }
        .label-cell { display: flex; align-items: center; gap: 8px; }
        .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 4px;
            background: #e2e8f0;
            font-size: 0.6rem;
            color: #475569;
            transition: transform .2s, background .15s;
            flex-shrink: 0;
        }
        .row-regiao.open .arrow {
            transform: rotate(90deg);
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* NÍVEL 2 (estado OU representante, dependendo do modo escolhido) */
        .row-nivel2 td {
            padding: 10px 16px 10px 40px;
            background: #fff;
            font-size: 0.8rem;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
            transition: background .1s;
            cursor: pointer;
            user-select: none;
        }
        .row-nivel2:hover td { background: #f9fafb; }
        .row-nivel2 td:not(:first-child) { text-align: right; }
        .row-nivel2 { display: none; }
        .row-nivel2.visible { display: table-row; }
        .row-nivel2 .arrow { width: 16px; height: 16px; font-size: 0.55rem; }
        .row-nivel2.open .arrow { transform: rotate(90deg); background: #dbeafe; color: #1d4ed8; }

        /* NÍVEL 3 (o outro entre estado/representante) */
        .row-nivel3 td {
            padding: 9px 16px 9px 62px;
            background: #fbfcfd;
            font-size: 0.76rem;
            color: #4b5563;
            border-bottom: 1px solid #f3f4f6;
            transition: background .1s;
            cursor: pointer;
            user-select: none;
        }
        .row-nivel3:hover td { background: #f3f4f6; }
        .row-nivel3 td:not(:first-child) { text-align: right; }
        .row-nivel3 { display: none; }
        .row-nivel3.visible { display: table-row; }
        .row-nivel3 .arrow { width: 14px; height: 14px; font-size: 0.5rem; }
        .row-nivel3.open .arrow { transform: rotate(90deg); background: #dbeafe; color: #1d4ed8; }

        /* NÍVEL 4 — contrato, sempre a folha da árvore, nunca clicável */
        .row-nivel4 td {
            padding: 7px 16px 7px 84px;
            background: #fff;
            font-size: 0.72rem;
            color: #6b7280;
            border-bottom: 1px solid #f8fafc;
        }
        .row-nivel4 td:not(:first-child) { text-align: right; }
        .row-nivel4 { display: none; }
        .row-nivel4.visible { display: table-row; }

        /* BADGE % */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            min-width: 48px;
            text-align: center;
        }
        .badge-brasil  { background: #d1fae5; color: #065f46; }
        .badge-regiao  { background: #dbeafe; color: #1e40af; }
        .badge-estado  { background: #f3f4f6; color: #374151; }
        .badge-contrato{ background: #f9fafb; color: #6b7280; font-weight: 600; }
        .badge-low     { background: #fee2e2; color: #991b1b; }
        .badge-mid     { background: #fef3c7; color: #92400e; }

        .loading {
            text-align: center;
            padding: 48px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        .error { color: #dc2626; }

        @media (max-width: 600px) {
            body { padding: 16px 8px; }
            header { gap: 8px; margin-bottom: 16px; }
            header h1 { font-size: 1.25rem; }
            .card { border-radius: 10px; }
            .row-nivel2 td { padding-left: 28px; }
            .row-nivel3 td { padding-left: 42px; }
            .row-nivel4 td { padding-left: 56px; }
            thead th, .row-brasil td, .row-regiao td, .row-nivel2 td, .row-nivel3 td, .row-nivel4 td { padding-top: 10px; padding-bottom: 10px; padding-right: 10px; }
            .arrow { width: 22px; height: 22px; }
            .toolbar button { flex: 1 1 100%; }
        }

        @media (max-width: 400px) {
            thead th, .row-brasil td, .row-regiao td, .row-nivel2 td, .row-nivel3 td, .row-nivel4 td { padding-top: 8px; padding-bottom: 8px; padding-right: 8px; font-size: 0.7rem; }
            .row-brasil td { font-size: 0.78rem; }
            .row-regiao td { font-size: 0.74rem; }
            .row-nivel2 td { font-size: 0.7rem; padding-left: 22px; }
            .row-nivel3 td { font-size: 0.68rem; padding-left: 34px; }
            .row-nivel4 td { font-size: 0.66rem; padding-left: 46px; }
            .badge { padding: 2px 6px; min-width: 40px; font-size: 0.68rem; }
            table { min-width: 560px; }
            .update-info { font-size: 0.72rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-top">
            <h1>📊 Acompanhamento de Vendas</h1>
            <span>clique em região, estado ou representante para expandir</span>
        </div>
        <div class="update-info" id="updateInfo"></div>
    </header>
    <div class="toolbar">
        <input type="text" id="busca" placeholder="Buscar representante, estado ou contrato...">
        <button id="btnModo" onclick="alternarModo()">🔀 Ordem: Estado → Representante</button>
    </div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="width:32%">Região / Estado</th>
                    <th>Meta Total</th>
                    <th id="thMetaParcial">Meta até --/--</th>
                    <th>Realizado</th>
                    <th>Atingimento</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="5" class="loading">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Este site NÃO processa mais planilha nenhuma no navegador — ele só lê
    // o resumo.json, que já vem pronto (gerado no repositório privado).
    // A partir da versão com detalhamento por representante/contrato, o
    // resumo.json PASSA a conter dado individual (nome do representante).
    // Por isso este site deve ficar atrás do Worker de autenticação
    // (usuário/senha) — não publique este resumo.json sem essa proteção.
    const ARQUIVO_RESUMO = 'resumo.json';

    const ORDEM_CONTRATOS = ['LED', 'PLÁSTICO', 'ALUMÍNIO', 'EX'];
    const LABEL_MODO = {
        'estado-representante': '🔀 Ordem: Estado → Representante',
        'representante-estado': '🔀 Ordem: Representante → Estado',
    };

    let resumoOriginal = null;
    let modoAtual = 'estado-representante';

    function fmt(v) {
        return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
    }

    function pct(realizado, meta) {
        if (!meta || meta === 0) return 0;
        return Math.round((realizado / meta) * 100);
    }

    function badgeClass(p, tipo) {
        if (tipo === 'brasil') return 'badge badge-brasil';
        if (tipo === 'regiao') {
            if (p < 10) return 'badge badge-low';
            if (p < 30) return 'badge badge-mid';
            return 'badge badge-regiao';
        }
        if (p < 10) return 'badge badge-low';
        if (p < 30) return 'badge badge-mid';
        return 'badge badge-estado';
    }

    function semAcento(s) {
        return String(s == null ? '' : s).normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
    }
    function normalizarTexto(s) {
        return semAcento(s).toUpperCase().replace(/\s+/g, ' ').trim();
    }

    // Cada linha (região/nível2/nível3/contrato) tem uma "chave" tipo
    // "0", "0-2", "0-2-1", "0-2-1-3" — números separados por hífen indicando
    // o caminho na árvore. toggle() abre/fecha os filhos DIRETOS dessa chave;
    // ao fechar, fecha também tudo mais fundo (netos, bisnetos), pra não
    // ficar um estado "lembrando" que estava aberto quando a região reabrir.
    function ehFilhoDireto(chavePai, chaveTeste) {
        if (!chaveTeste.startsWith(chavePai + '-')) return false;
        return !chaveTeste.slice(chavePai.length + 1).includes('-');
    }

    function toggle(chave) {
        const linha = document.getElementById('row-' + chave);
        const abrindo = !linha.classList.contains('open');
        linha.classList.toggle('open', abrindo);

        document.querySelectorAll('[data-chave]').forEach(el => {
            const chaveEl = el.getAttribute('data-chave');
            if (ehFilhoDireto(chave, chaveEl)) {
                el.classList.toggle('visible', abrindo);
                if (!abrindo) el.classList.remove('open');
            } else if (!abrindo && chaveEl.startsWith(chave + '-')) {
                el.classList.remove('visible');
                el.classList.remove('open');
            }
        });
    }

    // ---- Construção da árvore a partir do resumo.json, na ordem escolhida ----

    function extrairFolhas(resumo) {
        const folhas = [];
        (resumo.regioes || []).forEach(r => {
            (r.estados || []).forEach(e => {
                (e.representantes || []).forEach(p => {
                    (p.contratos || []).forEach(c => {
                        folhas.push({
                            grupoRegiao: r.grupo, nomeRegiao: r.nome,
                            uf: e.uf, repId: p.repId, nomeRep: p.nome,
                            contrato: c.contrato,
                            meta: c.meta, metaAteOntem: c.metaAteOntem, real: c.real,
                        });
                    });
                });
            });
        });
        return folhas;
    }

    function agruparOrdenado(folhas, chaveFn) {
        const mapa = new Map();
        const ordem = [];
        folhas.forEach(f => {
            const chave = chaveFn(f);
            if (!mapa.has(chave)) { mapa.set(chave, []); ordem.push(chave); }
            mapa.get(chave).push(f);
        });
        return ordem.map(chave => ({ chave, itens: mapa.get(chave) }));
    }

    function somar(itens) {
        return itens.reduce((acc, f) => {
            acc.meta += f.meta; acc.metaAteOntem += f.metaAteOntem; acc.real += f.real;
            return acc;
        }, { meta: 0, metaAteOntem: 0, real: 0 });
    }

    function construirArvore(resumo, modo) {
        const folhas = extrairFolhas(resumo);
        const regioesOrdem = (resumo.regioes || []).map(r => r.grupo);
        const nomeRegiaoPorGrupo = {};
        (resumo.regioes || []).forEach(r => { nomeRegiaoPorGrupo[r.grupo] = r.nome; });

        const chaveN2 = modo === 'representante-estado' ? f => f.repId : f => f.uf;
        const nomeN2  = modo === 'representante-estado' ? f => f.nomeRep : f => f.uf;
        const chaveN3 = modo === 'representante-estado' ? f => f.uf : f => f.repId;
        const nomeN3  = modo === 'representante-estado' ? f => f.uf : f => f.nomeRep;

        return regioesOrdem.map(grupo => {
            const folhasRegiao = folhas.filter(f => f.grupoRegiao === grupo);
            const totalRegiao = somar(folhasRegiao);
            const gruposN2 = agruparOrdenado(folhasRegiao, chaveN2)
                .sort((a, b) => somar(b.itens).meta - somar(a.itens).meta);

            return {
                label: nomeRegiaoPorGrupo[grupo], ...totalRegiao,
                filhos: gruposN2.map(g2 => {
                    const totalN2 = somar(g2.itens);
                    const gruposN3 = agruparOrdenado(g2.itens, chaveN3)
                        .sort((a, b) => somar(b.itens).meta - somar(a.itens).meta);
                    return {
                        label: nomeN2(g2.itens[0]), ...totalN2,
                        filhos: gruposN3.map(g3 => {
                            const totalN3 = somar(g3.itens);
                            const contratosOrdenados = [...g3.itens].sort((a, b) => {
                                const ia = ORDEM_CONTRATOS.indexOf(a.contrato);
                                const ib = ORDEM_CONTRATOS.indexOf(b.contrato);
                                return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
                            });
                            return {
                                label: nomeN3(g3.itens[0]), ...totalN3,
                                filhos: contratosOrdenados.map(f => ({
                                    label: f.contrato,
                                    meta: f.meta, metaAteOntem: f.metaAteOntem, real: f.real,
                                    filhos: [],
                                })),
                            };
                        }),
                    };
                }),
            };
        });
    }

    // ---- Filtro de busca: mantém um nó se ele OU algum descendente bate ----

    function noBate(no, queryNorm) {
        return normalizarTexto(no.label).includes(queryNorm);
    }

    function filtrarNo(no, queryNorm) {
        if (noBate(no, queryNorm)) return no; // mantém inteiro (com todos os filhos originais)
        if (!no.filhos || !no.filhos.length) return null;
        const filhosFiltrados = no.filhos.map(f => filtrarNo(f, queryNorm)).filter(Boolean);
        if (!filhosFiltrados.length) return null;
        return { ...no, filhos: filhosFiltrados };
    }

    function filtrarArvore(nos, queryNorm) {
        return nos.map(n => filtrarNo(n, queryNorm)).filter(Boolean);
    }

    // ---- Renderização ----

    function renderizarNos(nos, chavePai, profundidade, tbody, forcarAberto) {
        nos.forEach((no, idx) => {
            const chave = chavePai === null ? String(idx) : chavePai + '-' + idx;
            const clicavel = profundidade < 4;
            const classeLinha = profundidade === 1 ? 'row-regiao'
                : profundidade === 2 ? 'row-nivel2'
                : profundidade === 3 ? 'row-nivel3' : 'row-nivel4';
            const p = pct(no.real, no.metaAteOntem);
            const classeBadge = profundidade === 1 ? badgeClass(p, 'regiao')
                : profundidade === 4 ? 'badge badge-contrato' : badgeClass(p, 'estado');
            const classesExtra = forcarAberto ? (profundidade > 1 ? ' visible open' : ' open') : '';
            const dataChave = profundidade > 1 ? ` data-chave="${chave}"` : '';
            const onclick = clicavel
                ? ` onclick="${profundidade > 1 ? 'event.stopPropagation(); ' : ''}toggle('${chave}')"`
                : '';
            const conteudoLabel = clicavel
                ? `<div class="label-cell"><span class="arrow">▶</span>${no.label}</div>`
                : no.label;

            tbody.insertAdjacentHTML('beforeend', `
                <tr class="${classeLinha}${classesExtra}" id="row-${chave}"${dataChave}${onclick}>
                    <td>${conteudoLabel}</td>
                    <td>${fmt(no.meta)}</td>
                    <td>${fmt(no.metaAteOntem)}</td>
                    <td>${fmt(no.real)}</td>
                    <td><span class="${classeBadge}">${p}%</span></td>
                </tr>
            `);

            if (no.filhos && no.filhos.length) {
                renderizarNos(no.filhos, chave, profundidade + 1, tbody, forcarAberto);
            }
        });
    }

    function atualizarTabela() {
        if (!resumoOriginal) return;
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';

        // ---- BRASIL (sempre visível, não é afetado por busca/ordem) ----
        const brasil = resumoOriginal.brasil;
        const pBr = pct(brasil.real, brasil.metaAteOntem);
        tbody.insertAdjacentHTML('beforeend', `
            <tr class="row-brasil">
                <td>🇧🇷 BRASIL</td>
                <td>${fmt(brasil.meta)}</td>
                <td>${fmt(brasil.metaAteOntem)}</td>
                <td>${fmt(brasil.real)}</td>
                <td><span class="${badgeClass(pBr,'brasil')}">${pBr}%</span></td>
            </tr>
        `);

        const arvore = construirArvore(resumoOriginal, modoAtual);
        const termo = normalizarTexto(document.getElementById('busca').value);

        if (!termo) {
            renderizarNos(arvore, null, 1, tbody, false);
            return;
        }

        const arvoreFiltrada = filtrarArvore(arvore, termo);
        if (!arvoreFiltrada.length) {
            tbody.insertAdjacentHTML('beforeend', `
                <tr><td colspan="5" class="loading">Nenhum resultado para "${document.getElementById('busca').value}"</td></tr>
            `);
            return;
        }
        renderizarNos(arvoreFiltrada, null, 1, tbody, true);
    }

    function alternarModo() {
        modoAtual = modoAtual === 'estado-representante' ? 'representante-estado' : 'estado-representante';
        document.getElementById('btnModo').textContent = LABEL_MODO[modoAtual];
        atualizarTabela();
    }

    document.getElementById('busca').addEventListener('input', atualizarTabela);

    async function carregar() {
        try {
            const resp = await fetch(ARQUIVO_RESUMO + '?t=' + Date.now()); // evita cache velho
            if (!resp.ok) throw new Error(`Arquivo não encontrado: ${ARQUIVO_RESUMO}`);
            resumoOriginal = await resp.json();

            document.getElementById('updateInfo').innerHTML =
                `Última atualização: <strong>${resumoOriginal.geradoEm}</strong> &nbsp;·&nbsp; ` +
                `Dias úteis decorridos: <strong>${resumoOriginal.diasUteisDecorridos}/${resumoOriginal.diasUteisMes}</strong>`;
            document.getElementById('thMetaParcial').textContent = `Meta até ${resumoOriginal.metaAteData}`;

            atualizarTabela();
        } catch (err) {
            console.error(err);
            document.getElementById('tbody').innerHTML =
                `<tr><td colspan="5" class="loading error">❌ ${err.message}</td></tr>`;
        }
    }

    carregar();
</script>
</body>
</html>
