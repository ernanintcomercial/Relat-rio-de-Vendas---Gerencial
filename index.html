<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Vendas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container { max-width: 960px; margin: 0 auto; }

        header { margin-bottom: 24px; }
        .header-top {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        header span {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 400;
        }
        .update-info {
            margin-top: 6px;
            font-size: 0.78rem;
            color: #6b7280;
        }
        .update-info strong { color: #1a1a2e; }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Garante que as colunas nunca fiquem "espremidas" a ponto de
           virar ilegível; abaixo de min-width o card rola na horizontal
           em vez de quebrar os números de forma estranha. */
        table { width: 100%; min-width: 620px; border-collapse: collapse; }

        /* HEADER */
        thead tr {
            background: #1a1a2e;
            color: #fff;
        }
        thead th {
            padding: 13px 16px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        thead th:not(:first-child) { text-align: right; }

        /* Valores numéricos nunca quebram linha, mesmo em telas estreitas */
        td:not(:first-child) { white-space: nowrap; }

        /* BRASIL row */
        .row-brasil td {
            padding: 14px 16px;
            background: #1a1a2e;
            color: #f9fafb;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid #374151;
        }
        .row-brasil td:not(:first-child) { text-align: right; }

        /* REGIÃO row */
        .row-regiao td {
            padding: 13px 16px;
            background: #f8fafc;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
            transition: background .15s;
            user-select: none;
        }
        .row-regiao:hover td { background: #eff6ff; }
        .row-regiao td:not(:first-child) { text-align: right; }
        .row-regiao .label-cell { display: flex; align-items: center; gap: 8px; }
        .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 4px;
            background: #e2e8f0;
            font-size: 0.6rem;
            color: #475569;
            transition: transform .2s, background .15s;
            flex-shrink: 0;
        }
        .row-regiao.open .arrow {
            transform: rotate(90deg);
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* ESTADO row */
        .row-estado td {
            padding: 10px 16px 10px 48px;
            background: #fff;
            font-size: 0.8rem;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
            transition: background .1s;
        }
        .row-estado:hover td { background: #f9fafb; }
        .row-estado td:not(:first-child) { text-align: right; }
        .row-estado { display: none; }
        .row-estado.visible { display: table-row; }

        /* BADGE % */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            min-width: 48px;
            text-align: center;
        }
        .badge-brasil  { background: #d1fae5; color: #065f46; }
        .badge-regiao  { background: #dbeafe; color: #1e40af; }
        .badge-estado  { background: #f3f4f6; color: #374151; }
        .badge-low     { background: #fee2e2; color: #991b1b; }
        .badge-mid     { background: #fef3c7; color: #92400e; }

        .loading {
            text-align: center;
            padding: 48px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        .error { color: #dc2626; }

        @media (max-width: 600px) {
            body { padding: 16px 8px; }
            header { gap: 8px; margin-bottom: 16px; }
            header h1 { font-size: 1.25rem; }
            .card { border-radius: 10px; }
            .row-estado td { padding-left: 32px; }
            thead th, .row-brasil td, .row-regiao td, .row-estado td { padding: 11px 10px; }
            .arrow { width: 22px; height: 22px; }
        }

        @media (max-width: 400px) {
            thead th, .row-brasil td, .row-regiao td, .row-estado td { padding: 9px 8px; font-size: 0.72rem; }
            .row-brasil td { font-size: 0.8rem; }
            .row-regiao td { font-size: 0.76rem; }
            .row-estado td { font-size: 0.72rem; padding-left: 26px; }
            .badge { padding: 2px 6px; min-width: 40px; font-size: 0.68rem; }
            table { min-width: 560px; }
            .update-info { font-size: 0.72rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-top">
            <h1>📊 Acompanhamento de Vendas</h1>
            <span>clique nas regiões para expandir</span>
        </div>
        <div class="update-info" id="updateInfo"></div>
    </header>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="width:32%">Região / Estado</th>
                    <th>Meta Total</th>
                    <th id="thMetaParcial">Meta até --/--</th>
                    <th>Realizado</th>
                    <th>Atingimento</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="5" class="loading">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const FILE = 'Dados.xlsx';

    // Agrupamos pela coluna "Região" da planilha (é a região do REPRESENTANTE,
    // não do estado da venda — um representante do Sul/Centro Oeste que vende
    // para o Tocantins, por exemplo, continua contando no grupo Sul/Centro Oeste).
    //
    // A comparação é "normalizada" (remove acentos, ignora maiúsc./minúsc. e
    // espaços duplicados) para não quebrar se a planilha vier com formatação
    // ligeiramente diferente (ex.: "Sul e Centro Oeste" vs "SUL   CENTRO OESTE").
    const NOMES_GRUPO = {
        'SUL_CO':   '🗺️ Sul e Centro Oeste',
        'SUDESTE':  '🗺️ Sudeste',
        'NORTE_NE': '🗺️ Norte e Nordeste',
        'OUTROS':   '🗺️ Outras / Não informado',
    };
    const ORDEM_GRUPOS = ['SUL_CO', 'SUDESTE', 'NORTE_NE', 'OUTROS'];

    function semAcento(s) {
        return String(s == null ? '' : s).normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
    }

    function normalizarTexto(s) {
        return semAcento(s).toUpperCase().replace(/\s+/g, ' ').trim();
    }

    function grupoDaRegiao(regRaw) {
        const t = normalizarTexto(regRaw);
        if (!t) return 'OUTROS';
        if (t.includes('SUDESTE')) return 'SUDESTE';
        if (t.includes('NORTE') || t.includes('NORDESTE')) return 'NORTE_NE';
        if (t.includes('SUL') || t.includes('CENTRO')) return 'SUL_CO';
        return 'OUTROS';
    }

    // Encontra o nome exato da coluna na planilha, ignorando acento/maiúscula/espaço.
    // Assim funciona mesmo se o cabeçalho vier como "Região", "REGIAO", "Regiao " etc.
    function localizarColuna(linhaExemplo, alvoNormalizado) {
        for (const chave in linhaExemplo) {
            if (normalizarTexto(chave) === alvoNormalizado) return chave;
        }
        return null;
    }

    // Feriados que caem em dia útil (seg-sex) e por isso devem ser descontados
    // do cálculo de dias úteis do mês. Adicione no formato 'AAAA-MM-DD'.
    // Ex.: '2026-09-07' (Independência), '2026-11-02' (Finados)...
    const FERIADOS = [
        // '2026-07-09',
    ];

    function ehDiaUtil(date) {
        const diaSemana = date.getDay(); // 0 = domingo, 6 = sábado
        if (diaSemana === 0 || diaSemana === 6) return false;
        const iso = date.toISOString().slice(0, 10);
        if (FERIADOS.includes(iso)) return false;
        return true;
    }

    function contarDiasUteis(inicio, fim) {
        if (fim < inicio) return 0;
        let count = 0;
        const d = new Date(inicio);
        while (d <= fim) {
            if (ehDiaUtil(d)) count++;
            d.setDate(d.getDate() + 1);
        }
        return count;
    }

    function fmtData(d) {
        return d.toLocaleDateString('pt-BR');
    }

    // ---- Cálculo do fator de meta parcial (até o dia anterior) ----
    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);

    const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    const fimMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
    const ontem = new Date(hoje);
    ontem.setDate(hoje.getDate() - 1);

    const diasUteisMes = contarDiasUteis(inicioMes, fimMes);
    // Se hoje é dia 1º do mês, ainda não houve dia útil decorrido neste mês
    const dentroDoMes = ontem.getMonth() === hoje.getMonth() && ontem.getFullYear() === hoje.getFullYear();
    const diasUteisDecorridos = dentroDoMes ? contarDiasUteis(inicioMes, ontem) : 0;
    const fatorMetaParcial = diasUteisMes > 0 ? (diasUteisDecorridos / diasUteisMes) : 0;

    // Preenche cabeçalho com data de atualização e rótulo da coluna de meta parcial
    document.getElementById('updateInfo').innerHTML =
        `Última atualização: <strong>${fmtData(hoje)}</strong> &nbsp;·&nbsp; ` +
        `Dias úteis decorridos: <strong>${diasUteisDecorridos}/${diasUteisMes}</strong>`;
    document.getElementById('thMetaParcial').textContent = `Meta até ${fmtData(ontem)}`;

    function fmt(v) {
        return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
    }

    function pct(realizado, meta) {
        if (!meta || meta === 0) return 0;
        return Math.round((realizado / meta) * 100);
    }

    function badgeClass(p, tipo) {
        if (tipo === 'brasil') return 'badge badge-brasil';
        if (tipo === 'regiao') {
            if (p < 10) return 'badge badge-low';
            if (p < 30) return 'badge badge-mid';
            return 'badge badge-regiao';
        }
        if (p < 10) return 'badge badge-low';
        if (p < 30) return 'badge badge-mid';
        return 'badge badge-estado';
    }

    function toggleRegiao(regiaoId) {
        const headerRow = document.getElementById('reg-' + regiaoId);
        const estadoRows = document.querySelectorAll('.estado-' + regiaoId);
        const isOpen = headerRow.classList.contains('open');

        headerRow.classList.toggle('open', !isOpen);
        estadoRows.forEach(r => r.classList.toggle('visible', !isOpen));
    }

    async function carregar() {
        try {
            const resp = await fetch(FILE);
            if (!resp.ok) throw new Error(`Arquivo não encontrado: ${FILE}`);
            const buf = await resp.arrayBuffer();
            const wb = XLSX.read(buf, { type: 'array' });

            // Usar a primeira aba (Export)
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { defval: null });

            if (rows.length === 0) throw new Error('Planilha sem dados na primeira aba.');

            // Localiza os nomes reais das colunas na planilha (tolerante a acento/maiúscula/espaço)
            const colRegiao = localizarColuna(rows[0], 'REGIAO');
            const colUF     = localizarColuna(rows[0], 'UNIDADE FEDERATIVA');
            const colMeta   = localizarColuna(rows[0], 'META VENDAS');
            const colReal   = localizarColuna(rows[0], 'TOTAL GERAL');

            if (!colRegiao) console.warn('Coluna "Região" não encontrada na planilha — verifique o cabeçalho.');

            // Acumular totais
            let brasil = { meta: 0, real: 0 };
            const regioes = {};   // chave = código do grupo (SUL_CO, SUDESTE, NORTE_NE, OUTROS)
            const estados = {};   // chave = "grupo||UF"

            rows.forEach(r => {
                const meta  = parseFloat(r[colMeta] || 0) || 0;
                const real  = parseFloat(r[colReal] || 0) || 0;
                const uf    = (r[colUF] || 'NÃO INFORMADO').trim().toUpperCase();
                const grupo = grupoDaRegiao(colRegiao ? r[colRegiao] : null);

                brasil.meta += meta;
                brasil.real += real;

                if (!regioes[grupo]) regioes[grupo] = { meta: 0, real: 0 };
                regioes[grupo].meta += meta;
                regioes[grupo].real += real;

                const key = grupo + '||' + uf;
                if (!estados[key]) estados[key] = { grupo, uf, meta: 0, real: 0 };
                estados[key].meta += meta;
                estados[key].real += real;
            });

            // Ordenar regiões pela ordem preferida
            const regSorted = [
                ...ORDEM_GRUPOS.filter(k => regioes[k]),
                ...Object.keys(regioes).filter(k => !ORDEM_GRUPOS.includes(k))
            ];

            // Meta parcial (até o dia anterior), proporcional aos dias úteis já decorridos no mês
            brasil.metaAteOntem = brasil.meta * fatorMetaParcial;
            Object.values(regioes).forEach(rd => { rd.metaAteOntem = rd.meta * fatorMetaParcial; });
            Object.values(estados).forEach(e => { e.metaAteOntem = e.meta * fatorMetaParcial; });

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            // ---- BRASIL ----
            const pBr = pct(brasil.real, brasil.metaAteOntem);
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="row-brasil">
                    <td>🇧🇷 BRASIL</td>
                    <td>${fmt(brasil.meta)}</td>
                    <td>${fmt(brasil.metaAteOntem)}</td>
                    <td>${fmt(brasil.real)}</td>
                    <td><span class="${badgeClass(pBr,'brasil')}">${pBr}%</span></td>
                </tr>
            `);

            // ---- REGIÕES + ESTADOS ----
            regSorted.forEach((grupo, idx) => {
                const rd = regioes[grupo];
                const pR = pct(rd.real, rd.metaAteOntem);
                const label = NOMES_GRUPO[grupo] || ('🗺️ ' + grupo);

                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="row-regiao" id="reg-${idx}" onclick="toggleRegiao(${idx})">
                        <td>
                            <div class="label-cell">
                                <span class="arrow">▶</span>
                                ${label}
                            </div>
                        </td>
                        <td>${fmt(rd.meta)}</td>
                        <td>${fmt(rd.metaAteOntem)}</td>
                        <td>${fmt(rd.real)}</td>
                        <td><span class="${badgeClass(pR,'regiao')}">${pR}%</span></td>
                    </tr>
                `);

                // Estados desta região, ordenados por Meta desc
                const ufsRegiao = Object.values(estados)
                    .filter(e => e.grupo === grupo)
                    .sort((a, b) => b.meta - a.meta);

                ufsRegiao.forEach(e => {
                    const pE = pct(e.real, e.metaAteOntem);
                    tbody.insertAdjacentHTML('beforeend', `
                        <tr class="row-estado estado-${idx}">
                            <td>${e.uf}</td>
                            <td>${fmt(e.meta)}</td>
                            <td>${fmt(e.metaAteOntem)}</td>
                            <td>${fmt(e.real)}</td>
                            <td><span class="${badgeClass(pE,'estado')}">${pE}%</span></td>
                        </tr>
                    `);
                });
            });

        } catch (err) {
            console.error(err);
            document.getElementById('tbody').innerHTML =
                `<tr><td colspan="5" class="loading error">❌ ${err.message}</td></tr>`;
        }
    }

    carregar();
</script>
</body>
</html>
